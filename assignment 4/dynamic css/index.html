<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="text-here" id="text-container">
        This is some example text
    </div>

    <br>

    <input type="text" id="colorbox" placeholder="Enter color">

    <button id="colorchange" onclick="changeColor()">
        Change Color
    </button>

    <br><br>

    <input
        type="range"
        id="fontsize"
        min="10"
        max="100"
        value="55"
        oninput="changeFontSize()"
    >

    <script src="script.js"></script>

</body>
</html>
